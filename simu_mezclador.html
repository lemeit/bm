<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Mezclador | Estilo Profesional</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a2a32;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .sim-card {
            max-width: 1100px;
            margin: 0 auto;
            background: #eef2f5;
            border-radius: 32px;
            overflow: hidden;
        }
        .toolbar {
            background: #0f212e;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
        }
        .flowsheet {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        .equipo-mezclador {
            background: #cbdbe2;
            border-radius: 60px;
            padding: 20px;
            min-width: 180px;
            text-align: center;
            box-shadow: inset 0 0 0 3px white, 0 5px 15px rgba(0,0,0,0.2);
        }
        .corriente {
            background: white;
            border-radius: 24px;
            padding: 16px;
            min-width: 180px;
            text-align: center;
            border-top: 4px solid #2e7d32;
        }
        .editable {
            font-size: 1.6rem;
            font-weight: bold;
            background: #f4f9ff;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 28px;
            cursor: pointer;
        }
        .result-panel {
            background: #0f212e;
            color: white;
            margin: 20px;
            border-radius: 28px;
            padding: 16px;
            text-align: center;
        }
        .btn-volver { background: #1e3a4a; padding: 6px 16px; border-radius: 30px; color: white; text-decoration: none; }
    </style>
</head>
<body>
<div class="sim-card">
    <div class="toolbar">
        <div><strong style="color:white;">🧪 MEZCLADOR DE GASES (N₂ + H₂)</strong></div>
        <a href="simuladores.html" class="btn-volver">← Volver</a>
    </div>
    <div class="flowsheet">
        <div class="corriente">
            <div>📥 N₂</div>
            <div><span class="editable" id="n2_edit">280</span> <span style="font-size:0.8rem;">kg/h</span></div>
            <div style="font-size:0.7rem;">M = 28 kg/kmol</div>
        </div>
        <div class="equipo-mezclador">
            <div style="font-weight:bold;">⚙️ MEZCLADOR</div>
            <div style="font-size:12px;">estado estacionario</div>
        </div>
        <div class="corriente">
            <div>📤 SALIDA C</div>
            <div><span class="editable" id="salida_edit">40</span> <span style="font-size:0.8rem;">kgmol/h</span></div>
        </div>
    </div>
    <div class="result-panel" id="resultados">
        🔄 Cálculo automático ...
    </div>
</div>
<script>
    function actualizarMezclador() {
        let n2_kg = parseFloat(document.getElementById('n2_edit').innerText);
        let salida_kmol = parseFloat(document.getElementById('salida_edit').innerText);
        if(isNaN(n2_kg)) n2_kg = 280;
        if(isNaN(salida_kmol)) salida_kmol = 40;
        let n2_kmol = n2_kg / 28;
        let h2_kmol = salida_kmol - n2_kmol;
        let yH2 = h2_kmol / salida_kmol;
        let yN2 = 1 - yH2;
        document.getElementById('resultados').innerHTML = `
            <strong>📊 RESULTADOS</strong><br>
            ⚛️ N₂ entrada: ${n2_kmol.toFixed(2)} kgmol/h &nbsp;|&nbsp;
            💧 H₂ necesario: ${h2_kmol.toFixed(2)} kgmol/h <br>
            🧪 Fracción molar H₂: ${yH2.toFixed(4)} &nbsp;|&nbsp; Fracción N₂: ${yN2.toFixed(4)}
            ${h2_kmol<0 ? '<br><span style="color:#ffaa66;">⚠️ H₂ negativo: reducir flujo N₂ o aumentar salida</span>' : ''}
        `;
    }
    function makeEditableSpan(spanId, callback) {
        let span = document.getElementById(spanId);
        span.setAttribute('contenteditable','true');
        span.style.cursor = 'pointer';
        span.addEventListener('blur', () => { callback(); });
    }
    makeEditableSpan('n2_edit', actualizarMezclador);
    makeEditableSpan('salida_edit', actualizarMezclador);
    actualizarMezclador();
</script>
</body>
</html>
