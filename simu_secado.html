<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Secado Industrial | Estilo HYSYS</title>
    <style>
        body { background: #1a2a32; font-family: 'Segoe UI', Roboto; padding: 20px; }
        .sec-card { max-width: 1100px; margin: 0 auto; background: #eef2f5; border-radius: 32px; overflow: hidden; }
        .toolbar { background: #0f212e; padding: 12px 24px; display: flex; justify-content: space-between; }
        .flowsheet { padding: 40px; display: flex; justify-content: center; gap: 35px; flex-wrap: wrap; align-items: center; }
        .corriente { background: white; border-radius: 28px; padding: 20px; min-width: 200px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .secador { background: #9bb7d0; border-radius: 40px; padding: 25px; text-align: center; min-width: 180px; font-weight: bold; box-shadow: inset 0 0 0 3px white; }
        .editable { font-size: 1.6rem; font-weight: bold; background: #f0f4fa; display: inline-block; padding: 4px 12px; border-radius: 28px; cursor: pointer; }
        .result-panel { background: #0f212e; color: white; margin: 20px; border-radius: 28px; padding: 18px; text-align: center; }
        a.btn { background: #1e3a4a; padding: 6px 16px; border-radius: 30px; color: white; text-decoration: none; }
    </style>
</head>
<body>
<div class="sec-card">
    <div class="toolbar"><span style="color:white;">🌿 SECADOR DE SÓLIDOS (Pieles)</span><a href="simuladores.html" class="btn">← Volver</a></div>
    <div class="flowsheet">
        <div class="corriente"><div>📥 ALIMENTACIÓN HÚMEDA</div><div><span class="editable" id="A_display">---</span> <span style="font-size:0.8rem;">lb</span></div><div style="font-size:0.7rem;">(calculado)</div></div>
        <div class="secador">🔥 SECADOR<br>pérdida de agua</div>
        <div class="corriente"><div>📤 PRODUCTO SECO</div><div><span class="editable" id="peso_final_edit">900</span> lb</div><div>Humedad final: <span class="editable" id="hum_final_edit">7</span> %</div></div>
    </div>
    <div class="result-panel" id="resSecado">
        📊 Ajustando parámetros...
    </div>
</div>
<script>
    function actualizarSecado() {
        let pesoFinal = parseFloat(document.getElementById('peso_final_edit').innerText);
        let humedadFinal = parseFloat(document.getElementById('hum_final_edit').innerText);
        let perdidaPeso = 59.1; // fijo o editable si se quiere, lo dejamos como ejemplo pero lo hacemos editable extra
        if(isNaN(pesoFinal)) pesoFinal=900;
        if(isNaN(humedadFinal)) humedadFinal=7;
        let aguaFinal = pesoFinal * humedadFinal/100;
        let pielSeca = pesoFinal - aguaFinal;
        let A = (pielSeca + aguaFinal) / (1 - (perdidaPeso/100));
        let B = (perdidaPeso/100)*A;
        let aguaInicial = A - pielSeca;
        let porcElim = (B/aguaInicial)*100;
        document.getElementById('A_display').innerHTML = A.toFixed(1);
        document.getElementById('resSecado').innerHTML = `
            <strong>📊 RESULTADOS DEL SECADO</strong><br>
            🧺 Alimentación inicial: ${A.toFixed(1)} lb &nbsp;| 💧 Agua extraída: ${B.toFixed(1)} lb<br>
            🧪 Agua eliminada: ${porcElim.toFixed(1)}% &nbsp;| Relación agua/piel seca: ${(B/pielSeca).toFixed(3)} lb agua/lb sólido
        `;
    }
    function makeEditableSpan(id) {
        let el = document.getElementById(id);
        el.setAttribute('contenteditable','true');
        el.addEventListener('blur', actualizarSecado);
    }
    makeEditableSpan('peso_final_edit');
    makeEditableSpan('hum_final_edit');
    actualizarSecado();
</script>
</body>
</html>
